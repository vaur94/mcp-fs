name: Auto Merge Bots

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: read-all

concurrency:
  group: auto-merge-bots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false && (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'app/dependabot' ||
        startsWith(github.event.pull_request.head.ref, 'release-please--')
      )
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for bot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch=false
