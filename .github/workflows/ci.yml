name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore mcp-fs.sln

      - name: Build
        run: dotnet build mcp-fs.sln -c Release --no-restore

      - name: Test
        run: dotnet test mcp-fs.sln -c Release --no-build --verbosity normal
