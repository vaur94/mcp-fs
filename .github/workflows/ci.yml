name: CI

on:
  push:
  pull_request:

permissions: read-all

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-format:
    name: Build/Test/Format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore mcp-fs.sln

      - name: Build
        run: dotnet build mcp-fs.sln -c Release --no-restore

      - name: Test
        run: dotnet test mcp-fs.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Verify formatting (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format mcp-fs.sln --verify-no-changes

      - name: Check debt markers (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if rg -n "TO[D]O|FI[X]ME|HA[C]K" --glob '!docs/answer.md' .; then
            echo "Found debt markers"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/test-results.trx'
