name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            archive: tar.gz
          - rid: linux-arm64
            archive: tar.gz
          - rid: win-x64
            archive: zip
          - rid: osx-x64
            archive: tar.gz
          - rid: osx-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Publish self-contained single-file
        run: |
          mkdir -p artifacts/${{ matrix.rid }}
          dotnet publish src/McpFs/McpFs.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:PublishTrimmed=false \
            -o artifacts/${{ matrix.rid }}

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -C artifacts -czf dist/mcp-fs-${{ matrix.rid }}.tar.gz ${{ matrix.rid }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p dist
          (cd artifacts && zip -r ../dist/mcp-fs-${{ matrix.rid }}.zip ${{ matrix.rid }})

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-fs-${{ matrix.rid }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cp samples/mcp-fs.config.json.sample release/
          cp samples/workers/mcp-fs.worker.json release/
          (cd release && sha256sum * > SHA256SUMS)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS
            release/mcp-fs.config.json.sample
            release/mcp-fs.worker.json
          generate_release_notes: true
